<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Ghost Pad</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
            width: 90%;
            max-width: 550px;
            text-align: center;
            border: 1px solid #2d2d2d;
        }
        h2 {
            margin-bottom: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        input[type="password"] {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            background-color: #252525;
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="password"]:focus {
            border-color: #00adb5;
        }
        textarea {
            width: 100%;
            height: 280px;
            padding: 15px;
            margin-top: 10px;
            border: 1px solid #3a3a3a;
            border-radius: 6px;
            background-color: #252525;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.05rem;
            line-height: 1.5;
            resize: none;
            outline: none;
            transition: border-color 0.2s;
        }
        textarea:focus {
            border-color: #00adb5;
        }
        button {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 1rem;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #008c92;
        }
        .hidden {
            display: none !important;
        }
        .warning {
            color: #ff5252;
            font-size: 0.85rem;
            margin-top: 15px;
            line-height: 1.4;
        }
        #error-msg {
            margin-top: 0;
            margin-bottom: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-screen">
            <h2>Enter Security Password</h2>
            <input type="password" id="password-input" placeholder="••••••••" autofocus>
            <p id="error-msg" class="warning hidden">Incorrect Password! Try again.</p>
            <button onclick="checkPassword()">Unlock Pad</button>
        </div>

        <div id="app-screen" class="hidden">
            <h2>Secure Text Pad</h2>
            <textarea id="text-pad" placeholder="Start typing your temporary notes here..."></textarea>
            <p class="warning">⚠️ CRITICAL: Refreshing, closing, or navigating away from this page will permanently and instantly wipe this text from memory.</p>
        </div>
    </div>

    <script>
        // Secure password requirement
        const CORRECT_PASSWORD = "ois.48.ai"; 

        function checkPassword() {
            const userInput = document.getElementById('password-input').value;
            const errorMsg = document.getElementById('error-msg');
            
            if (userInput === CORRECT_PASSWORD) {
                // Hide login screen, show text pad
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app-screen').classList.remove('hidden');
                // Auto-focus into textpad for immediate typing
                document.getElementById('text-pad').focus();
            } else {
                // Show error message and reset input
                errorMsg.classList.remove('hidden');
                document.getElementById('password-input').value = '';
                document.getElementById('password-input').focus();
            }
        }

        // Allow 'Enter' key submission
        document.getElementById('password-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
